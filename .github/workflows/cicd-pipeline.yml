name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Run Clippy - JSON
        run: |
          cargo clippy --all-targets --all-features --workspace \
            --message-format=json -- -D warnings \
            > clippy-report.json 2>&1 || true

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features --workspace -- -D warnings

      - name: Upload Clippy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-report
          path: clippy-report.json
          retention-days: 14

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run doc tests
        run: cargo test --doc --workspace

      - name: Run tests with coverage
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov \
            --all-features \
            --workspace \
            --lcov --output-path lcov.info
          cargo llvm-cov report --html

      - name: Enforce coverage threshold (80%)
        run: cargo llvm-cov report --fail-under-lines 80


      - name: Upload coverage (lcov + HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            lcov.info
            target/llvm-cov/html
          retention-days: 14

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo-audit (SARIF)
        run: cargo audit --format sarif > cargo-audit.sarif || true

      - name: Run cargo-audit (human-readable, advisory)
        run: cargo audit || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: cargo-audit.sarif
          retention-days: 14

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [test, security]
    if: needs.test.result == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Download Clippy report
        uses: actions/download-artifact@v4
        with:
          name: clippy-report

      - name: Download audit report
        uses: actions/download-artifact@v4
        with:
          name: audit-report

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}